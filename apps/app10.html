<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>可愛記帳小幫手｜進階版</title>
  <style>
    :root {
      --bg1: #fff7fb;
      --bg2: #f7f4ff;
      --card: rgba(255,255,255,0.94);
      --pink: #ff8fba;
      --pink-dark: #ff6fa7;
      --purple: #b89cff;
      --mint: #8fe4cf;
      --blue: #9fc7ff;
      --text: #4b4453;
      --subtext: #7d7388;
      --line: #f3dbe8;
      --shadow: 0 14px 36px rgba(255, 143, 186, 0.14);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #ffe7f2 0%, transparent 28%),
        radial-gradient(circle at top right, #ece2ff 0%, transparent 24%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      min-height: 100vh;
      padding: 14px;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
    }

    .hero {
      background: linear-gradient(135deg, rgba(255,255,255,0.97), rgba(255,244,250,0.98));
      border-radius: 28px;
      padding: 20px;
      box-shadow: var(--shadow);
      border: 2px solid rgba(255,255,255,0.85);
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "✦ ʚɞ ✦";
      position: absolute;
      right: 18px;
      top: 16px;
      color: #ffacd0;
      font-size: 18px;
      letter-spacing: 3px;
    }

    .title {
      margin: 0;
      font-size: clamp(28px, 6vw, 38px);
      font-weight: 900;
      color: var(--pink-dark);
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--subtext);
      font-size: 14px;
      line-height: 1.7;
      max-width: 92%;
    }

    .stack {
      display: grid;
      gap: 16px;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(10px);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      border: 2px solid rgba(255,255,255,0.8);
    }

    .card h2 {
      margin: 0 0 12px;
      font-size: 18px;
      color: #6b5a92;
    }

    .form-grid,
    .filter-grid,
    .edit-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 14px;
      font-weight: 700;
      color: #7a679c;
    }

    input, select {
      width: 100%;
      border: none;
      outline: none;
      padding: 14px 16px;
      border-radius: 16px;
      background: #fff;
      color: var(--text);
      font-size: 15px;
      box-shadow: inset 0 0 0 2px #f5d8e8;
      transition: 0.2s ease;
    }

    input:focus, select:focus {
      box-shadow: inset 0 0 0 2px var(--pink);
      transform: translateY(-1px);
    }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    button {
      border: none;
      cursor: pointer;
      border-radius: 999px;
      padding: 13px 18px;
      font-size: 15px;
      font-weight: 800;
      transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
      width: 100%;
    }

    button:hover { transform: translateY(-2px); }

    .primary {
      background: linear-gradient(135deg, var(--pink), var(--pink-dark));
      color: white;
      box-shadow: 0 10px 20px rgba(255, 111, 167, 0.25);
    }

    .secondary {
      background: linear-gradient(135deg, #c6b1ff, #9f8cff);
      color: white;
    }

    .mint {
      background: linear-gradient(135deg, #94e6d1, #67d7bb);
      color: white;
    }

    .ghost {
      background: #fff;
      color: #8c79b0;
      box-shadow: inset 0 0 0 2px #eadfff;
    }

    .danger {
      background: linear-gradient(135deg, #ff9db2, #ff7d9f);
      color: white;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .stat {
      border-radius: 20px;
      padding: 14px;
      color: #fff;
      min-height: 98px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: var(--shadow);
    }

    .stat.balance { background: linear-gradient(135deg, #ff92bd, #ff73aa); }
    .stat.income { background: linear-gradient(135deg, #97e4ce, #6dd9be); }
    .stat.expense { background: linear-gradient(135deg, #c5b0ff, #a28dff); }

    .stat .label {
      font-size: 14px;
      opacity: 0.96;
      font-weight: 700;
    }

    .stat .value {
      font-size: clamp(22px, 5vw, 30px);
      font-weight: 900;
      margin-top: 8px;
      word-break: break-word;
    }

    .search-summary {
      background: linear-gradient(135deg, rgba(255,245,250,0.95), rgba(247,241,255,0.95));
      border: 2px solid var(--line);
      border-radius: 18px;
      padding: 12px 14px;
      margin-bottom: 14px;
      color: #6b5a92;
    }

    .search-summary .title {
      font-size: 13px;
      font-weight: 700;
      color: #8a78a8;
      margin: 0 0 6px;
    }

    .search-summary .value {
      font-size: 24px;
      font-weight: 900;
      color: #ff6fa7;
      line-height: 1.2;
    }

    .search-summary .sub {
      font-size: 13px;
      color: var(--subtext);
      margin-top: 4px;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 420px;
      overflow: auto;
      padding-right: 4px;
    }

    .item {
      background: #fff;
      border-radius: 20px;
      padding: 14px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      align-items: center;
      box-shadow: 0 10px 20px rgba(184, 156, 255, 0.08);
      border: 2px solid #f9eef5;
    }

    .item-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 16px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }

    .badge {
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      color: white;
    }

    .badge.income { background: #69d4b7; }
    .badge.expense { background: #ff89b5; }

    .meta {
      color: var(--subtext);
      font-size: 13px;
      line-height: 1.6;
    }

    .amount {
      text-align: left;
      font-weight: 900;
      font-size: 20px;
    }

    .amount.income { color: #38b592; }
    .amount.expense { color: #ff5f9c; }

    .item-actions {
      margin-top: 10px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .small-btn {
      padding: 8px 12px;
      font-size: 13px;
      border-radius: 999px;
      background: #fff5fa;
      color: #a36c8b;
      box-shadow: inset 0 0 0 2px #ffd5e6;
      width: auto;
    }

    .small-btn.edit {
      background: #f5f0ff;
      color: #7a60b6;
      box-shadow: inset 0 0 0 2px #ded0ff;
    }

    .small-btn.delete {
      background: #fff0f2;
      color: #d55c74;
      box-shadow: inset 0 0 0 2px #ffc4ce;
    }

    .empty {
      text-align: center;
      color: var(--subtext);
      padding: 30px 16px;
      background: rgba(255,255,255,0.7);
      border-radius: 20px;
      border: 2px dashed #f2cfe0;
      line-height: 1.8;
    }

    .chart-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .chart-canvas {
      width: 100%;
      background: #fff;
      border-radius: 20px;
      border: 2px solid #f7e3ee;
      display: block;
    }

    .section-soft {
      background: rgba(255,255,255,0.74);
    }

    .editor-panel {
      display: none;
      margin-top: 14px;
      border: 2px solid #edd9f5;
      background: linear-gradient(135deg, rgba(255,250,252,0.96), rgba(248,244,255,0.96));
    }

    .editor-panel.show {
      display: block;
    }

    .editor-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .editor-title {
      font-size: 16px;
      font-weight: 900;
      color: #6b5a92;
    }

    .mini-text {
      font-size: 13px;
      color: var(--subtext);
    }

    .footer-note {
      text-align: center;
      color: #907cae;
      margin-top: 16px;
      font-size: 13px;
    }

    @media (min-width: 720px) {
      body { padding: 20px; }
      button { width: auto; }
      .form-grid,
      .filter-grid,
      .edit-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .field.full { grid-column: 1 / -1; }
      .stats { grid-template-columns: repeat(3, 1fr); }
      .item { grid-template-columns: 1fr auto; }
      .amount { text-align: right; }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <h1 class="title">🐰 可愛記帳小幫手｜進階版 UI</h1>
      <p class="subtitle">改成更像 App 的操作方式，不再用跳出視窗編輯。你可以直接在頁面內新增、篩選、編輯與管理分類。</p>
    </section>

    <div class="stack">
      <section class="card">
        <h2>✨ 新增一筆記錄</h2>
        <form id="recordForm">
          <div class="form-grid">
            <div class="field">
              <label for="type">類型</label>
              <select id="type" required>
                <option value="expense">支出</option>
                <option value="income">收入</option>
              </select>
            </div>
            <div class="field">
              <label for="amount">金額</label>
              <input id="amount" type="number" min="0" step="1" placeholder="例如：120" required />
            </div>
            <div class="field">
              <label for="category">分類</label>
              <select id="category" required></select>
            </div>
            <div class="field">
              <label for="date">日期</label>
              <input id="date" type="date" required />
            </div>
            <div class="field full">
              <label for="note">備註</label>
              <input id="note" type="text" maxlength="50" placeholder="例如：午餐、捷運、租金收入" />
            </div>
          </div>
          <div class="btn-row">
            <button class="primary" type="submit">➕ 加入記帳</button>
            <button class="ghost" type="button" id="resetFormBtn">重設欄位</button>
          </div>
        </form>
      </section>

      <section class="card section-soft">
        <h2 id="categoryEditorTitle">支出分類管理</h2>
        <div class="btn-row" style="margin-top:0; margin-bottom:12px;">
          <button class="primary" type="button" data-category-tab="expense">支出分類</button>
          <button class="ghost" type="button" data-category-tab="income">收入分類</button>
        </div>

        <div class="card" style="padding:14px; margin-bottom:12px; background:rgba(255,255,255,0.9); border:2px solid #eddcf5;">
          <div class="editor-title" id="categoryFormTitle">➕ 新增分類</div>
          <form id="categoryForm">
            <div class="edit-grid" style="margin-top:12px;">
              <div class="field">
                <label for="categoryEmojiInput">表情符號</label>
                <input id="categoryEmojiInput" type="text" maxlength="4" placeholder="例如：🍜" />
              </div>
              <div class="field">
                <label for="categoryNameInput">分類名稱</label>
                <input id="categoryNameInput" type="text" maxlength="20" placeholder="例如：餐飲" />
              </div>
            </div>
            <div class="btn-row">
              <button class="secondary" type="submit" id="saveCategoryBtn">儲存分類</button>
              <button class="ghost" type="button" id="cancelCategoryEditBtn">取消</button>
            </div>
          </form>
        </div>

        <div class="list" id="categoryEditorList" style="max-height: 260px;"></div>
      </section>

      <section class="card">
        <h2>💖 本月小總覽</h2>
        <div class="stats">
          <div class="stat balance">
            <div class="label">目前結餘</div>
            <div class="value" id="balance">NT$ 0</div>
          </div>
          <div class="stat income">
            <div class="label">總收入</div>
            <div class="value" id="incomeTotal">NT$ 0</div>
          </div>
          <div class="stat expense">
            <div class="label">總支出</div>
            <div class="value" id="expenseTotal">NT$ 0</div>
          </div>
        </div>

        <h2>🔍 查找記錄</h2>
        <div class="filter-grid">
          <div class="field">
            <label for="filterType">類型篩選</label>
            <select id="filterType">
              <option value="all">全部類型</option>
              <option value="income">只看收入</option>
              <option value="expense">只看支出</option>
            </select>
          </div>
          <div class="field">
            <label for="searchInput">分類篩選</label>
            <select id="searchInput">
              <option value="">全部分類</option>
            </select>
          </div>
        </div>

        <div class="search-summary">
          <div class="title">查找結果加總</div>
          <div class="value" id="filteredTotal">NT$ 0</div>
          <div class="sub" id="filteredCount">共 0 筆資料</div>
        </div>

        <div class="card editor-panel" id="editorPanel">
          <div class="editor-head">
            <div>
              <div class="editor-title">✏️ 編輯這筆記錄</div>
              <div class="mini-text">直接在頁面內修改，不用跳出視窗</div>
            </div>
          </div>
          <form id="editForm">
            <div class="edit-grid">
              <div class="field">
                <label for="editType">類型</label>
                <select id="editType" required>
                  <option value="expense">支出</option>
                  <option value="income">收入</option>
                </select>
              </div>
              <div class="field">
                <label for="editAmount">金額</label>
                <input id="editAmount" type="number" min="0" step="1" required />
              </div>
              <div class="field">
                <label for="editCategory">分類</label>
                <select id="editCategory" required></select>
              </div>
              <div class="field">
                <label for="editDate">日期</label>
                <input id="editDate" type="date" required />
              </div>
              <div class="field full">
                <label for="editNote">備註</label>
                <input id="editNote" type="text" maxlength="50" />
              </div>
            </div>
            <div class="btn-row">
              <button class="mint" type="submit">儲存修改</button>
              <button class="ghost" type="button" id="cancelEditBtn">取消編輯</button>
            </div>
          </form>
        </div>

        <div class="card section-soft" style="margin-top: 16px; margin-bottom: 16px;">
          <h2 style="margin-bottom: 12px;">📊 收支比例分析</h2>
          <div class="chart-grid">
            <canvas id="monthlyExpensePieChart" class="chart-canvas" width="520" height="320"></canvas>
            <canvas id="yearlyExpensePieChart" class="chart-canvas" width="520" height="320" style="border-color:#f1e7ff;"></canvas>
            <canvas id="monthlyIncomePieChart" class="chart-canvas" width="520" height="320" style="border-color:#e3f3ee;"></canvas>
            <canvas id="yearlyIncomePieChart" class="chart-canvas" width="520" height="320" style="border-color:#e8f0ff;"></canvas>
          </div>
        </div>

        <div class="btn-row" style="margin-top: 0; margin-bottom: 14px;">
          <button class="secondary" type="button" id="exportBtn">下載 JSON 備份</button>
          <button class="danger" type="button" id="clearAllBtn">清空全部資料</button>
        </div>

        <div class="list" id="recordList"></div>
      </section>
    </div>

    <div class="footer-note">用甜甜的方式，把每一筆錢都照顧好 🌷</div>
  </div>

  <script>
    const STORAGE_KEY = 'cute_expense_records_advanced_v1';
    const CATEGORY_STORAGE_KEY = 'cute_expense_categories_advanced_v1';

    const defaultCategoryMap = {
      expense: [
        { name: '餐飲', emoji: '🍜' },
        { name: '交通', emoji: '🚌' },
        { name: '購物', emoji: '🛍️' },
        { name: '娛樂', emoji: '🎮' },
        { name: '醫療', emoji: '💊' },
        { name: '學習', emoji: '📚' },
        { name: '電信', emoji: '📱' },
        { name: '養育', emoji: '🧒' }
      ],
      income: [
        { name: '薪水', emoji: '💼' },
        { name: '投資', emoji: '📈' },
        { name: '房租', emoji: '🏠' },
        { name: '松果', emoji: '🌲' }
      ]
    };

    const form = document.getElementById('recordForm');
    const typeInput = document.getElementById('type');
    const amountInput = document.getElementById('amount');
    const categoryInput = document.getElementById('category');
    const dateInput = document.getElementById('date');
    const noteInput = document.getElementById('note');

    const editForm = document.getElementById('editForm');
    const editorPanel = document.getElementById('editorPanel');
    const editType = document.getElementById('editType');
    const editAmount = document.getElementById('editAmount');
    const editCategory = document.getElementById('editCategory');
    const editDate = document.getElementById('editDate');
    const editNote = document.getElementById('editNote');
    const cancelEditBtn = document.getElementById('cancelEditBtn');

    const recordList = document.getElementById('recordList');
    const balanceEl = document.getElementById('balance');
    const incomeTotalEl = document.getElementById('incomeTotal');
    const expenseTotalEl = document.getElementById('expenseTotal');
    const searchInput = document.getElementById('searchInput');
    const filterType = document.getElementById('filterType');
    const resetFormBtn = document.getElementById('resetFormBtn');
    const clearAllBtn = document.getElementById('clearAllBtn');
    const exportBtn = document.getElementById('exportBtn');
    const categoryForm = document.getElementById('categoryForm');
    const categoryFormTitle = document.getElementById('categoryFormTitle');
    const categoryEmojiInput = document.getElementById('categoryEmojiInput');
    const categoryNameInput = document.getElementById('categoryNameInput');
    const cancelCategoryEditBtn = document.getElementById('cancelCategoryEditBtn');

    let categoryMap = loadCategoryMap();
    let records = loadRecords();
    let editingCategoryType = 'expense';
    let editingRecordId = null;
    let editingCategoryIndex = null;

    function clone(obj) {
      return JSON.parse(JSON.stringify(obj));
    }

    function todayString() {
      const now = new Date();
      return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
    }

    function formatMoney(num) {
      const value = Number(num || 0);
      const sign = value < 0 ? '-' : '';
      return `${sign}NT$ ${Math.abs(value).toLocaleString('zh-TW')}`;
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function loadCategoryMap() {
      try {
        const raw = localStorage.getItem(CATEGORY_STORAGE_KEY);
        if (!raw) return clone(defaultCategoryMap);
        const parsed = JSON.parse(raw);
        return {
          expense: Array.isArray(parsed.expense) && parsed.expense.length ? parsed.expense.filter(x => x && x.name) : clone(defaultCategoryMap.expense),
          income: Array.isArray(parsed.income) && parsed.income.length ? parsed.income.filter(x => x && x.name) : clone(defaultCategoryMap.income)
        };
      } catch {
        return clone(defaultCategoryMap);
      }
    }

    function saveCategoryMap() {
      localStorage.setItem(CATEGORY_STORAGE_KEY, JSON.stringify(categoryMap));
    }

    function loadRecords() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    }

    function saveRecords() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }

    function getCategoryObject(type, categoryName) {
      return (categoryMap[type] || []).find(item => item.name === categoryName);
    }

    function fillCategorySelect(selectEl, type, currentValue = '') {
      let categories = categoryMap[type] || [];
      if (!categories.length) {
        categories = clone(defaultCategoryMap[type] || []);
        categoryMap[type] = categories;
        saveCategoryMap();
      }
      selectEl.innerHTML = categories
        .map(c => `<option value="${escapeHtml(c.name)}">${escapeHtml(c.emoji || '✨')} ${escapeHtml(c.name)}</option>`)
        .join('');
      if (currentValue) selectEl.value = currentValue;
    }

    function updateCategoryOptions() {
      fillCategorySelect(categoryInput, typeInput.value);
      renderCategoryEditor();
    }

    function updateEditCategoryOptions(currentValue = '') {
      fillCategorySelect(editCategory, editType.value, currentValue);
    }

    function updateSearchOptions() {
      const currentValue = searchInput.value;
      const typeFilter = filterType.value;
      let categories = [];

      if (typeFilter === 'income') categories = categoryMap.income || [];
      else if (typeFilter === 'expense') categories = categoryMap.expense || [];
      else categories = [...(categoryMap.expense || []), ...(categoryMap.income || [])];

      const unique = [];
      const seen = new Set();
      categories.forEach(item => {
        if (!item || !item.name) return;
        const key = `${item.emoji || '✨'}-${item.name}`;
        if (!seen.has(key)) {
          seen.add(key);
          unique.push(item);
        }
      });

      searchInput.innerHTML = ['<option value="">全部分類</option>']
        .concat(unique.map(item => `<option value="${escapeHtml(item.name)}">${escapeHtml(item.emoji || '✨')} ${escapeHtml(item.name)}</option>`))
        .join('');

      searchInput.value = unique.some(item => item.name === currentValue) ? currentValue : '';
    }

    function resetForm() {
      form.reset();
      typeInput.value = 'expense';
      updateCategoryOptions();
      dateInput.value = todayString();
      amountInput.focus();
    }

    function closeEditor() {
      editingRecordId = null;
      editorPanel.classList.remove('show');
      editForm.reset();
    }

    function openEditor(record) {
      editingRecordId = record.id;
      editType.value = record.type;
      updateEditCategoryOptions(record.category);
      editAmount.value = record.amount;
      editDate.value = record.date;
      editNote.value = record.note || '';
      editorPanel.classList.add('show');
      editorPanel.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function addRecord(data) {
      records.unshift({ id: crypto.randomUUID(), ...data, amount: Number(data.amount) });
      saveRecords();
      render();
    }

    function updateRecord(id, newData) {
      records = records.map(item => item.id === id ? { ...item, ...newData, amount: Number(newData.amount) } : item);
      saveRecords();
      render();
    }

    function deleteRecord(id) {
      records = records.filter(item => item.id !== id);
      if (editingRecordId === id) closeEditor();
      saveRecords();
      render();
    }

    function addCategory(type, emoji, name) {
      categoryMap[type].push({ emoji, name });
      saveCategoryMap();
      updateCategoryOptions();
      updateEditCategoryOptions();
      updateSearchOptions();
      resetCategoryForm();
      render();
    }

    function updateCategory(type, index, emoji, name) {
      const oldName = categoryMap[type][index].name;
      categoryMap[type][index] = { emoji, name };
      saveCategoryMap();
      renameCategoryReferences(type, oldName, name, emoji);
      updateCategoryOptions();
      updateEditCategoryOptions();
      updateSearchOptions();
      resetCategoryForm();
      render();
    }

    function resetCategoryForm() {
      editingCategoryIndex = null;
      categoryFormTitle.textContent = '➕ 新增分類';
      categoryEmojiInput.value = '';
      categoryNameInput.value = '';
    }

    function renameCategoryReferences(type, oldName, newName, emoji) {
      records = records.map(record => {
        if (record.type === type && record.category === oldName) {
          return { ...record, category: newName, categoryEmoji: emoji };
        }
        return record;
      });
      saveRecords();
    }

    function deleteCategory(type, index) {
      const removed = categoryMap[type][index];
      categoryMap[type].splice(index, 1);
      const fallback = categoryMap[type][0] || clone(defaultCategoryMap[type])[0];

      records = records.map(record => {
        if (record.type === type && record.category === removed.name) {
          return { ...record, category: fallback.name, categoryEmoji: fallback.emoji };
        }
        return record;
      });

      saveCategoryMap();
      saveRecords();
      updateCategoryOptions();
      updateEditCategoryOptions();
      updateSearchOptions();
      render();
    }

    function renderCategoryEditor() {
      const wrap = document.getElementById('categoryEditorList');
      const title = document.getElementById('categoryEditorTitle');
      const typeTabs = document.querySelectorAll('[data-category-tab]');
      title.textContent = editingCategoryType === 'expense' ? '支出分類管理' : '收入分類管理';
      typeTabs.forEach(btn => btn.className = btn.dataset.categoryTab === editingCategoryType ? 'primary' : 'ghost');

      const items = categoryMap[editingCategoryType] || [];
      wrap.innerHTML = items.map((item, index) => `
        <div class="item" style="grid-template-columns:1fr; gap:8px;">
          <div class="meta" style="font-size:15px; color:#5a4f67; font-weight:800;">${escapeHtml(item.emoji)} ${escapeHtml(item.name)}</div>
          <div class="item-actions" style="margin-top:0; justify-content:flex-start;">
            <button class="small-btn edit" onclick="startEditCategory('${editingCategoryType}', ${index})">編輯</button>
            <button class="small-btn delete" onclick="deleteCategoryPrompt('${editingCategoryType}', ${index})">刪除</button>
          </div>
        </div>
      `).join('');
    }

    function getFilteredRecords() {
      const categoryKeyword = searchInput.value.trim().toLowerCase();
      const type = filterType.value;
      return records.filter(item => {
        const matchType = type === 'all' ? true : item.type === type;
        const matchCategory = categoryKeyword ? item.category.toLowerCase() === categoryKeyword : true;
        return matchType && matchCategory;
      });
    }

    function renderFilteredSummary(list) {
      const total = list.reduce((sum, item) => sum + (item.type === 'income' ? Number(item.amount || 0) : -Number(item.amount || 0)), 0);
      const income = list.reduce((sum, item) => sum + (item.type === 'income' ? Number(item.amount || 0) : 0), 0);
      const expense = list.reduce((sum, item) => sum + (item.type === 'expense' ? Number(item.amount || 0) : 0), 0);
      document.getElementById('filteredTotal').textContent = formatMoney(total);
      document.getElementById('filteredCount').textContent = `共 ${list.length} 筆資料｜收入 ${formatMoney(income)}｜支出 ${formatMoney(expense)}`;
    }

    function renderStats() {
      const income = records.filter(r => r.type === 'income').reduce((sum, r) => sum + r.amount, 0);
      const expense = records.filter(r => r.type === 'expense').reduce((sum, r) => sum + r.amount, 0);
      const balance = income - expense;
      incomeTotalEl.textContent = formatMoney(income);
      expenseTotalEl.textContent = formatMoney(expense);
      balanceEl.textContent = formatMoney(balance);
    }

    function renderList() {
      const list = getFilteredRecords();
      renderFilteredSummary(list);
      if (!list.length) {
        recordList.innerHTML = `<div class="empty">目前還沒有符合的記錄唷。<br />快新增第一筆，開始可愛記帳吧 🧸</div>`;
        return;
      }

      recordList.innerHTML = list.map(item => `
        <div class="item">
          <div>
            <div class="item-title">
              <span class="badge ${item.type}">${item.type === 'income' ? '收入' : '支出'}</span>
              <span>${escapeHtml(item.note || '未填備註')}</span>
            </div>
            <div class="meta">
              分類：${escapeHtml(item.categoryEmoji || '✨')} ${escapeHtml(item.category)}<br>
              日期：${escapeHtml(item.date)}
            </div>
            <div class="item-actions">
              <button class="small-btn edit" onclick="editRecordById('${item.id}')">編輯</button>
              <button class="small-btn delete" onclick="deleteRecordById('${item.id}')">刪除</button>
            </div>
          </div>
          <div class="amount ${item.type}">${item.type === 'income' ? '+' : '-'} ${formatMoney(item.amount)}</div>
        </div>
      `).join('');
    }

    function getPeriodCategoryTotals(period = 'month', targetType = 'expense') {
      const now = new Date();
      const currentYear = now.getFullYear();
      const currentMonth = now.getMonth() + 1;
      const totals = {};
      records.forEach(item => {
        if (item.type !== targetType) return;
        const d = new Date(item.date);
        if (Number.isNaN(d.getTime())) return;
        const year = d.getFullYear();
        const month = d.getMonth() + 1;
        const match = period === 'year' ? year === currentYear : year === currentYear && month === currentMonth;
        if (!match) return;
        totals[item.category] = (totals[item.category] || 0) + Number(item.amount || 0);
      });
      return totals;
    }

    function resizeCanvasForDisplay(canvas) {
      const ratio = window.devicePixelRatio || 1;
      const displayWidth = Math.max(320, Math.floor(canvas.clientWidth || canvas.parentElement.clientWidth || 520));
      const displayHeight = Math.max(300, Math.floor(displayWidth * 0.68));
      canvas.width = Math.floor(displayWidth * ratio);
      canvas.height = Math.floor(displayHeight * ratio);
      canvas.style.height = `${displayHeight}px`;
      const ctx = canvas.getContext('2d');
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      return { ctx, width: displayWidth, height: displayHeight };
    }

    function drawRoundedRect(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.arcTo(x + width, y, x + width, y + height, radius);
      ctx.arcTo(x + width, y + height, x, y + height, radius);
      ctx.arcTo(x, y + height, x, y, radius);
      ctx.arcTo(x, y, x + width, y, radius);
      ctx.closePath();
    }

    function drawPieChart(canvasId, dataMap, titleText, centerLabel) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;
      const { ctx, width, height } = resizeCanvasForDisplay(canvas);
      const cx = width / 2;
      const cy = height / 2 - 6;
      const radius = Math.min(width, height) * 0.2;
      ctx.clearRect(0, 0, width, height);

      const entries = Object.entries(dataMap).filter(([, value]) => value > 0);
      const total = entries.reduce((sum, [, value]) => sum + value, 0);

      ctx.font = 'bold 18px Microsoft JhengHei';
      ctx.fillStyle = '#6b5a92';
      ctx.textAlign = 'left';
      ctx.fillText(titleText, 16, 28);

      if (!entries.length || total <= 0) {
        ctx.font = '15px Microsoft JhengHei';
        ctx.fillStyle = '#8b7f98';
        ctx.textAlign = 'center';
        ctx.fillText('目前沒有收支資料可以顯示圓餅圖', cx, cy + 10);
        return;
      }

      const colors = ['#ff8fba', '#b89cff', '#9fe7d7', '#ffd37e', '#8ec5ff', '#ffb38a', '#c6a6ff', '#ff9eb1', '#87d8f7', '#f3a6d6'];
      let startAngle = -Math.PI / 2;
      entries.forEach(([label, value], index) => {
        const sliceAngle = (value / total) * Math.PI * 2;
        const endAngle = startAngle + sliceAngle;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, radius, startAngle, endAngle);
        ctx.closePath();
        ctx.fillStyle = colors[index % colors.length];
        ctx.fill();
        startAngle = endAngle;
      });

      ctx.beginPath();
      ctx.arc(cx, cy, radius * 0.52, 0, Math.PI * 2);
      ctx.fillStyle = '#fffafc';
      ctx.fill();

      ctx.textAlign = 'center';
      ctx.fillStyle = '#6b5a92';
      ctx.font = 'bold 14px Microsoft JhengHei';
      ctx.fillText(centerLabel, cx, cy - 4);
      ctx.font = 'bold 16px Microsoft JhengHei';
      ctx.fillText(formatMoney(total), cx, cy + 18);

      const legendX = 16;
      let legendY = cy + radius + 28;
      if (legendY < 190) legendY = 190;
      ctx.textAlign = 'left';

      entries.forEach(([label, value], index) => {
        const ratio = ((value / total) * 100).toFixed(1);
        ctx.fillStyle = colors[index % colors.length];
        drawRoundedRect(ctx, legendX, legendY + index * 24, 14, 14, 4);
        ctx.fill();
        ctx.fillStyle = '#5f5569';
        ctx.font = '13px Microsoft JhengHei';
        const categoryObj = Object.values(categoryMap).flat().find(c => c.name === label);
        const labelText = `${categoryObj ? categoryObj.emoji + ' ' : ''}${label} ${ratio}%（${formatMoney(value)}）`;
        ctx.fillText(labelText, legendX + 22, legendY + 12 + index * 24);
      });
    }

    function renderCharts() {
      drawPieChart('monthlyExpensePieChart', getPeriodCategoryTotals('month', 'expense'), '本月支出比例圓餅圖', '總支出');
      drawPieChart('yearlyExpensePieChart', getPeriodCategoryTotals('year', 'expense'), '今年支出比例圓餅圖', '總支出');
      drawPieChart('monthlyIncomePieChart', getPeriodCategoryTotals('month', 'income'), '本月收入比例圓餅圖', '總收入');
      drawPieChart('yearlyIncomePieChart', getPeriodCategoryTotals('year', 'income'), '今年收入比例圓餅圖', '總收入');
    }

    function render() {
      renderStats();
      renderList();
      renderCharts();
    }

    window.deleteRecordById = function(id) {
      if (confirm('要刪除這筆記錄嗎？')) deleteRecord(id);
    };

    window.editRecordById = function(id) {
      const item = records.find(record => record.id === id);
      if (!item) return;
      openEditor(item);
    };

    window.startEditCategory = function(type, index) {
      const item = categoryMap[type][index];
      editingCategoryType = type;
      editingCategoryIndex = index;
      categoryFormTitle.textContent = '✏️ 編輯分類';
      categoryEmojiInput.value = item.emoji || '';
      categoryNameInput.value = item.name || '';
      renderCategoryEditor();
      categoryEmojiInput.focus();
    };

    window.deleteCategoryPrompt = function(type, index) {
      if ((categoryMap[type] || []).length <= 1) return alert('至少要保留一個分類');
      const item = categoryMap[type][index];
      if (!confirm(`要刪除分類「${item.emoji} ${item.name}」嗎？\n已使用這個分類的資料會改到其他分類。`)) return;
      deleteCategory(type, index);
    };

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const amount = Number(amountInput.value);
      if (!amount || amount <= 0) return alert('請輸入正確的金額');
      const selectedCategory = getCategoryObject(typeInput.value, categoryInput.value);
      addRecord({
        type: typeInput.value,
        amount,
        category: selectedCategory ? selectedCategory.name : categoryInput.value,
        categoryEmoji: selectedCategory ? selectedCategory.emoji : (typeInput.value === 'income' ? '🌟' : '✨'),
        date: dateInput.value,
        note: noteInput.value.trim()
      });
      resetForm();
    });

    editForm.addEventListener('submit', (e) => {
      e.preventDefault();
      if (!editingRecordId) return;
      const amount = Number(editAmount.value);
      if (!amount || amount <= 0) return alert('請輸入正確的金額');
      const selectedCategory = getCategoryObject(editType.value, editCategory.value);
      updateRecord(editingRecordId, {
        type: editType.value,
        amount,
        category: selectedCategory ? selectedCategory.name : editCategory.value,
        categoryEmoji: selectedCategory ? selectedCategory.emoji : (editType.value === 'income' ? '🌟' : '✨'),
        date: editDate.value,
        note: editNote.value.trim()
      });
      closeEditor();
    });

    typeInput.addEventListener('change', updateCategoryOptions);
    editType.addEventListener('change', () => updateEditCategoryOptions());
    searchInput.addEventListener('change', renderList);
    filterType.addEventListener('change', () => {
      updateSearchOptions();
      renderList();
    });
    resetFormBtn.addEventListener('click', resetForm);
    cancelEditBtn.addEventListener('click', closeEditor);

    clearAllBtn.addEventListener('click', () => {
      if (!records.length) return alert('目前沒有資料可以清空');
      if (confirm('真的要清空全部記帳資料嗎？此動作無法復原。')) {
        records = [];
        closeEditor();
        saveRecords();
        render();
      }
    });

    categoryForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const emoji = (categoryEmojiInput.value || '').trim() || (editingCategoryType === 'expense' ? '✨' : '🌟');
      const name = (categoryNameInput.value || '').trim();
      if (!name) return alert('分類名稱不可空白');

      const duplicated = (categoryMap[editingCategoryType] || []).some((item, idx) => {
        if (editingCategoryIndex === null) return item.name === name;
        return idx !== editingCategoryIndex && item.name === name;
      });
      if (duplicated) return alert('這個分類名稱已存在');

      if (editingCategoryIndex === null) {
        addCategory(editingCategoryType, emoji, name);
      } else {
        updateCategory(editingCategoryType, editingCategoryIndex, emoji, name);
      }
    });

    cancelCategoryEditBtn.addEventListener('click', () => {
      resetCategoryForm();
      renderCategoryEditor();
    });

    document.addEventListener('click', (e) => {
      const tab = e.target.closest('[data-category-tab]');
      if (!tab) return;
      editingCategoryType = tab.dataset.categoryTab;
      resetCategoryForm();
      renderCategoryEditor();
    });

    exportBtn.addEventListener('click', () => {
      const blob = new Blob([JSON.stringify(records, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = '記帳資料備份_進階版.json';
      a.click();
      URL.revokeObjectURL(url);
    });

    window.addEventListener('resize', renderCharts);

    updateCategoryOptions();
    updateEditCategoryOptions();
    updateSearchOptions();
    resetCategoryForm();
    dateInput.value = todayString();
    render();
  </script>
</body>
</html>
