<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MP4 轉 MP3 工具</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
      background: linear-gradient(135deg, #f8fafc, #e2e8f0);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 520px;
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.12);
      padding: 28px;
    }
    .title {
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 8px;
      color: #0f172a;
    }
    .subtitle {
      text-align: center;
      color: #475569;
      font-size: 14px;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .upload-box {
      border: 2px dashed #94a3b8;
      border-radius: 18px;
      padding: 24px;
      text-align: center;
      background: #f8fafc;
      transition: 0.2s;
      margin-bottom: 18px;
    }
    .upload-box:hover {
      border-color: #3b82f6;
      background: #eff6ff;
    }
    input[type="file"] {
      display: block;
      margin: 0 auto 12px;
      max-width: 100%;
    }
    .file-name {
      font-size: 14px;
      color: #334155;
      word-break: break-all;
      min-height: 22px;
    }
    .btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 12px;
    }
    .btn-primary {
      background: #2563eb;
      color: white;
    }
    .btn-primary:hover {
      background: #1d4ed8;
    }
    .btn-primary:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }
    .btn-download {
      display: none;
      text-align: center;
      text-decoration: none;
      background: #16a34a;
      color: #fff;
    }
    .btn-download:hover {
      background: #15803d;
    }
    .status {
      margin-top: 18px;
      padding: 14px;
      border-radius: 14px;
      background: #f1f5f9;
      color: #0f172a;
      font-size: 14px;
      line-height: 1.6;
      min-height: 52px;
      white-space: pre-wrap;
    }
    .progress-wrap {
      width: 100%;
      height: 14px;
      background: #e2e8f0;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 14px;
      display: none;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #3b82f6, #06b6d4);
      transition: width 0.2s;
    }
    .tips {
      margin-top: 16px;
      font-size: 12px;
      color: #64748b;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">MP4 轉 MP3</div>
    <div class="subtitle">
      上傳 MP4 影片，直接在瀏覽器中轉成 MP3 音訊
    </div>

    <div class="upload-box">
      <input type="file" id="fileInput" accept="video/mp4,.mp4" />
      <div class="file-name" id="fileName">尚未選擇檔案</div>
    </div>

    <button class="btn btn-primary" id="convertBtn">開始轉換</button>
    <a id="downloadBtn" class="btn btn-download" download="output.mp3">下載 MP3</a>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="status" id="status">請先選擇一個 MP4 檔案。</div>

    <div class="tips">
      提醒：第一次使用時會先載入轉檔核心，可能要等幾秒到幾十秒。<br>
      檔案太大時，瀏覽器可能會比較慢。
    </div>
  </div>

  <script type="module">
    import { FFmpeg } from "https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/esm/index.js";
    import { fetchFile, toBlobURL } from "https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/esm/index.js";

    const fileInput = document.getElementById("fileInput");
    const fileName = document.getElementById("fileName");
    const convertBtn = document.getElementById("convertBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const status = document.getElementById("status");
    const progressWrap = document.getElementById("progressWrap");
    const progressBar = document.getElementById("progressBar");

    let selectedFile = null;
    let ffmpeg = null;
    let loaded = false;

    fileInput.addEventListener("change", (e) => {
      selectedFile = e.target.files[0] || null;
      fileName.textContent = selectedFile ? selectedFile.name : "尚未選擇檔案";
      downloadBtn.style.display = "none";
      downloadBtn.removeAttribute("href");
      progressWrap.style.display = "none";
      progressBar.style.width = "0%";
      status.textContent = selectedFile
        ? "已選擇檔案，請按「開始轉換」。"
        : "請先選擇一個 MP4 檔案。";
    });

    async function loadFFmpeg() {
      if (loaded) return;

      status.textContent = "正在載入轉檔核心，請稍候...";
      progressWrap.style.display = "block";
      progressBar.style.width = "8%";

      ffmpeg = new FFmpeg();

      ffmpeg.on("progress", ({ progress }) => {
        const percent = Math.max(10, Math.min(100, Math.round(progress * 100)));
        progressBar.style.width = percent + "%";
        status.textContent = `正在轉換中... ${percent}%`;
      });

      ffmpeg.on("log", ({ message }) => {
        console.log(message);
      });

      const baseURL = "https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/esm";

      const coreURL = await toBlobURL(`${baseURL}/ffmpeg-core.js`, "text/javascript");
      const wasmURL = await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, "application/wasm");

      await ffmpeg.load({
        coreURL,
        wasmURL
      });

      loaded = true;
      progressBar.style.width = "20%";
      status.textContent = "轉檔核心載入完成。";
    }

    convertBtn.addEventListener("click", async () => {
      if (!selectedFile) {
        alert("請先選擇 MP4 檔案");
        return;
      }

      convertBtn.disabled = true;
      downloadBtn.style.display = "none";
      progressWrap.style.display = "block";
      progressBar.style.width = "0%";

      try {
        await loadFFmpeg();

        const inputName = "input.mp4";
        const outputName = "output.mp3";

        status.textContent = "正在寫入檔案...";
        progressBar.style.width = "25%";

        await ffmpeg.writeFile(inputName, await fetchFile(selectedFile));

        status.textContent = "正在擷取音訊並轉成 MP3...";
        progressBar.style.width = "35%";

        await ffmpeg.exec([
          "-i", inputName,
          "-vn",
          "-ar", "44100",
          "-ac", "2",
          "-b:a", "192k",
          outputName
        ]);

        status.textContent = "正在讀取輸出檔案...";
        progressBar.style.width = "92%";

        const data = await ffmpeg.readFile(outputName);
        const mp3Blob = new Blob([data.buffer], { type: "audio/mpeg" });
        const url = URL.createObjectURL(mp3Blob);

        downloadBtn.href = url;
        downloadBtn.download = selectedFile.name.replace(/\.mp4$/i, "") + ".mp3";
        downloadBtn.style.display = "block";

        progressBar.style.width = "100%";
        status.textContent = "轉換完成，請點擊「下載 MP3」。";

        try { await ffmpeg.deleteFile(inputName); } catch {}
        try { await ffmpeg.deleteFile(outputName); } catch {}
      } catch (error) {
        console.error(error);
        status.textContent = "轉換失敗，可能是瀏覽器不支援、檔案太大，或載入核心失敗。";
        alert("轉換失敗，請改用 Chrome / Edge，並建議透過本機伺服器或網站開啟此頁面。");
      } finally {
        convertBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
