<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>PDF 簽名工具</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.5/dist/signature_pad.umd.min.js"></script>
  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      text-align: center;
      margin: 0;
      padding: 16px;
      background: #f7f8fc;
      color: #222;
    }

    h2 {
      margin-top: 8px;
      margin-bottom: 18px;
      font-size: 24px;
    }

    h3 {
      margin-top: 24px;
      margin-bottom: 12px;
      font-size: 20px;
    }

    input[type="file"] {
      margin-bottom: 12px;
      max-width: 100%;
    }

    #status {
      margin: 8px 0 16px;
      font-size: 15px;
      color: #444;
    }

    #pdf-container {
      position: relative;
      display: inline-block;
      width: 100%;
      max-width: 100%;
      overflow: auto;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      padding: 8px;
    }

    #pdf-canvas {
      display: block;
      max-width: 100%;
      height: auto;
      border-radius: 10px;
      margin: 0 auto;
      border: 1px solid #ddd;
      background: #fff;
    }

    #signature-overlay {
      position: absolute;
      top: 8px;
      left: 8px;
      z-index: 10;
      background: transparent;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    .signature-wrap {
      width: min(94vw, 460px);
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    #signature-pad {
      width: 100%;
      height: 240px;
      display: block;
      border: 2px dashed #b9c1d0;
      border-radius: 12px;
      background: #fcfcff;
      margin: 0 auto 12px;
      touch-action: none;
    }

    .btn-group {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 8px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      background: #2f6fed;
      color: white;
      min-width: 120px;
    }

    .hint {
      font-size: 14px;
      color: #666;
      margin-bottom: 10px;
      line-height: 1.7;
    }

    @media (max-width: 768px) {
      body { padding: 12px; }
      h2 { font-size: 22px; }
      h3 { font-size: 18px; }

      #signature-pad {
        height: 280px;
      }

      button {
        width: 100%;
        max-width: 320px;
      }
    }
  </style>
</head>
<body>

  <h2>PDF 簽名工具</h2>

  <input type="file" id="upload" accept="application/pdf" />
  <p id="status"></p>

  <div id="pdf-container">
    <canvas id="pdf-canvas"></canvas>
    <canvas id="signature-overlay"></canvas>
  </div>

  <h3>簽名區</h3>
  <div class="signature-wrap">
    <div class="hint">
      請先在下方簽名，按「套用簽名」後：<br>
      <b>單指拖曳位置，雙指縮放大小</b>
    </div>

    <canvas id="signature-pad"></canvas>

    <div class="btn-group">
      <button type="button" onclick="clearSignature()">清除</button>
      <button type="button" onclick="applySignature()">套用簽名</button>
      <button type="button" onclick="downloadPDF()">下載 PDF</button>
    </div>
  </div>

  <script>
    let pdfDoc = null;
    let currentPage = 1;
    let signaturePad = null;
    let signatureImage = null;

    let sigX = 50;
    let sigY = 50;
    let sigDisplayWidth = 240;
    let sigDisplayHeight = 120;
    let sigAspectRatio = 2;

    let isMouseDragging = false;
    let mouseOffsetX = 0;
    let mouseOffsetY = 0;

    let isTouchDragging = false;
    let isPinching = false;
    let touchOffsetX = 0;
    let touchOffsetY = 0;

    let pinchStartDistance = 0;
    let pinchStartWidth = 0;
    let pinchStartHeight = 0;
    let pinchCenterStartX = 0;
    let pinchCenterStartY = 0;
    let pinchSigStartX = 0;
    let pinchSigStartY = 0;

    const MIN_SIG_WIDTH = 90;
    const MAX_SIG_WIDTH_RATIO = 0.92;

    const statusText = document.getElementById('status');
    const pdfCanvas = document.getElementById('pdf-canvas');
    const pdfCtx = pdfCanvas.getContext('2d');
    const overlayCanvas = document.getElementById('signature-overlay');
    const overlayCtx = overlayCanvas.getContext('2d');
    const signaturePadCanvas = document.getElementById('signature-pad');

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    function resizeSignaturePad() {
      const ratio = Math.max(window.devicePixelRatio || 1, 1);
      const rect = signaturePadCanvas.getBoundingClientRect();

      signaturePadCanvas.width = rect.width * ratio;
      signaturePadCanvas.height = rect.height * ratio;

      const ctx = signaturePadCanvas.getContext('2d');
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(ratio, ratio);

      if (signaturePad) signaturePad.clear();

      signaturePad = new SignaturePad(signaturePadCanvas, {
        minWidth: 1.2,
        maxWidth: 3.0,
        penColor: '#111'
      });
    }

    function updateSignatureDefaultSize() {
      if (window.innerWidth <= 768) {
        sigDisplayWidth = 260;
        sigDisplayHeight = 130;
      } else {
        sigDisplayWidth = 220;
        sigDisplayHeight = 110;
      }
      sigAspectRatio = sigDisplayWidth / sigDisplayHeight;
    }

    window.addEventListener('load', () => {
      if (typeof SignaturePad === 'undefined') {
        alert('SignaturePad 載入失敗');
        return;
      }
      updateSignatureDefaultSize();
      resizeSignaturePad();
    });

    window.addEventListener('resize', () => {
      updateSignatureDefaultSize();
      resizeSignaturePad();
      if (signatureImage) {
        keepSignatureInside();
        drawSignature();
      }
    });

    document.getElementById('upload').addEventListener('change', async function (e) {
      try {
        const file = e.target.files[0];
        if (!file) return;

        statusText.innerText = '載入 PDF 中...';
        const arrayBuffer = await file.arrayBuffer();
        pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

        statusText.innerText = 'PDF 載入成功';
        await renderPage();
      } catch (err) {
        console.error(err);
        statusText.innerText = '❌ PDF 載入失敗';
      }
    });

    async function renderPage() {
      try {
        const page = await pdfDoc.getPage(currentPage);

        const containerWidth = Math.min(window.innerWidth - 40, 900);
        const unscaledViewport = page.getViewport({ scale: 1 });
        const scale = containerWidth / unscaledViewport.width;
        const viewport = page.getViewport({ scale });

        pdfCanvas.width = viewport.width;
        pdfCanvas.height = viewport.height;
        pdfCanvas.style.width = viewport.width + 'px';
        pdfCanvas.style.height = viewport.height + 'px';

        overlayCanvas.width = viewport.width;
        overlayCanvas.height = viewport.height;
        overlayCanvas.style.width = viewport.width + 'px';
        overlayCanvas.style.height = viewport.height + 'px';

        await page.render({
          canvasContext: pdfCtx,
          viewport: viewport
        }).promise;

        keepSignatureInside();
        if (signatureImage) drawSignature();
      } catch (err) {
        console.error(err);
        statusText.innerText = '❌ 渲染失敗';
      }
    }

    function clearSignature() {
      if (!signaturePad) return;
      signaturePad.clear();
    }

    function applySignature() {
      if (!signaturePad || signaturePad.isEmpty()) {
        alert('請先簽名');
        return;
      }

      signatureImage = signaturePad.toDataURL('image/png');

      if (window.innerWidth <= 768) {
        sigDisplayWidth = 260;
        sigDisplayHeight = 130;
      } else {
        sigDisplayWidth = 220;
        sigDisplayHeight = 110;
      }

      sigAspectRatio = sigDisplayWidth / sigDisplayHeight;
      sigX = Math.max(20, (overlayCanvas.width - sigDisplayWidth) / 2);
      sigY = Math.max(20, (overlayCanvas.height - sigDisplayHeight) / 2);

      drawSignature();
    }

    function drawSignature() {
      if (!signatureImage) return;

      const img = new Image();
      img.src = signatureImage;

      img.onload = () => {
        overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
        overlayCtx.drawImage(img, sigX, sigY, sigDisplayWidth, sigDisplayHeight);
      };
    }

    function keepSignatureInside() {
      const maxWidth = overlayCanvas.width * MAX_SIG_WIDTH_RATIO;

      if (sigDisplayWidth > maxWidth) {
        sigDisplayWidth = maxWidth;
        sigDisplayHeight = sigDisplayWidth / sigAspectRatio;
      }

      if (sigDisplayWidth < MIN_SIG_WIDTH) {
        sigDisplayWidth = MIN_SIG_WIDTH;
        sigDisplayHeight = sigDisplayWidth / sigAspectRatio;
      }

      if (sigDisplayHeight > overlayCanvas.height * 0.7) {
        sigDisplayHeight = overlayCanvas.height * 0.7;
        sigDisplayWidth = sigDisplayHeight * sigAspectRatio;
      }

      sigX = Math.max(0, Math.min(sigX, overlayCanvas.width - sigDisplayWidth));
      sigY = Math.max(0, Math.min(sigY, overlayCanvas.height - sigDisplayHeight));
    }

    function getCanvasPoint(clientX, clientY) {
      const rect = overlayCanvas.getBoundingClientRect();
      const scaleX = overlayCanvas.width / rect.width;
      const scaleY = overlayCanvas.height / rect.height;

      return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY
      };
    }

    function isInsideSignature(x, y) {
      return (
        x >= sigX &&
        x <= sigX + sigDisplayWidth &&
        y >= sigY &&
        y <= sigY + sigDisplayHeight
      );
    }

    function getTouchDistance(t1, t2) {
      const dx = t2.x - t1.x;
      const dy = t2.y - t1.y;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function getTouchCenter(t1, t2) {
      return {
        x: (t1.x + t2.x) / 2,
        y: (t1.y + t2.y) / 2
      };
    }

    // ===== 電腦滑鼠拖曳 =====
    overlayCanvas.addEventListener('mousedown', (e) => {
      if (!signatureImage) return;

      const p = getCanvasPoint(e.clientX, e.clientY);
      if (!isInsideSignature(p.x, p.y)) return;

      isMouseDragging = true;
      mouseOffsetX = p.x - sigX;
      mouseOffsetY = p.y - sigY;
      e.preventDefault();
    });

    window.addEventListener('mousemove', (e) => {
      if (!isMouseDragging || !signatureImage) return;

      const p = getCanvasPoint(e.clientX, e.clientY);
      sigX = p.x - mouseOffsetX;
      sigY = p.y - mouseOffsetY;

      keepSignatureInside();
      drawSignature();
      e.preventDefault();
    });

    window.addEventListener('mouseup', () => {
      isMouseDragging = false;
    });

    // ===== 安卓 / 手機觸控：單指拖曳、雙指縮放 =====
    overlayCanvas.addEventListener('touchstart', (e) => {
      if (!signatureImage) return;

      if (e.touches.length === 1) {
        const t = e.touches[0];
        const p = getCanvasPoint(t.clientX, t.clientY);

        if (isInsideSignature(p.x, p.y)) {
          isTouchDragging = true;
          isPinching = false;
          touchOffsetX = p.x - sigX;
          touchOffsetY = p.y - sigY;
        }
      }

      if (e.touches.length === 2) {
        const t1 = getCanvasPoint(e.touches[0].clientX, e.touches[0].clientY);
        const t2 = getCanvasPoint(e.touches[1].clientX, e.touches[1].clientY);
        const center = getTouchCenter(t1, t2);

        if (
          isInsideSignature(t1.x, t1.y) ||
          isInsideSignature(t2.x, t2.y) ||
          isInsideSignature(center.x, center.y)
        ) {
          isTouchDragging = false;
          isPinching = true;

          pinchStartDistance = getTouchDistance(t1, t2);
          pinchStartWidth = sigDisplayWidth;
          pinchStartHeight = sigDisplayHeight;

          pinchCenterStartX = center.x;
          pinchCenterStartY = center.y;
          pinchSigStartX = sigX;
          pinchSigStartY = sigY;
        }
      }

      e.preventDefault();
    }, { passive: false });

    overlayCanvas.addEventListener('touchmove', (e) => {
      if (!signatureImage) return;

      if (isPinching && e.touches.length === 2) {
        const t1 = getCanvasPoint(e.touches[0].clientX, e.touches[0].clientY);
        const t2 = getCanvasPoint(e.touches[1].clientX, e.touches[1].clientY);

        const center = getTouchCenter(t1, t2);
        const newDistance = getTouchDistance(t1, t2);

        if (pinchStartDistance > 0) {
          let scale = newDistance / pinchStartDistance;
          let newWidth = pinchStartWidth * scale;
          const maxWidth = overlayCanvas.width * MAX_SIG_WIDTH_RATIO;

          newWidth = Math.max(MIN_SIG_WIDTH, Math.min(newWidth, maxWidth));
          let newHeight = newWidth / sigAspectRatio;

          const relX = (pinchCenterStartX - pinchSigStartX) / pinchStartWidth;
          const relY = (pinchCenterStartY - pinchSigStartY) / pinchStartHeight;

          sigDisplayWidth = newWidth;
          sigDisplayHeight = newHeight;

          sigX = center.x - sigDisplayWidth * relX;
          sigY = center.y - sigDisplayHeight * relY;

          keepSignatureInside();
          drawSignature();
        }

        e.preventDefault();
        return;
      }

      if (isTouchDragging && e.touches.length === 1) {
        const t = e.touches[0];
        const p = getCanvasPoint(t.clientX, t.clientY);

        sigX = p.x - touchOffsetX;
        sigY = p.y - touchOffsetY;

        keepSignatureInside();
        drawSignature();
        e.preventDefault();
      }
    }, { passive: false });

    overlayCanvas.addEventListener('touchend', (e) => {
      if (e.touches.length === 0) {
        isTouchDragging = false;
        isPinching = false;
      } else if (e.touches.length === 1) {
        isPinching = false;
      }
      e.preventDefault();
    }, { passive: false });

    overlayCanvas.addEventListener('touchcancel', () => {
      isTouchDragging = false;
      isPinching = false;
    }, { passive: false });

    async function downloadPDF() {
      try {
        if (!signatureImage) {
          alert('請先套用簽名');
          return;
        }

        const fileInput = document.getElementById('upload');
        if (!fileInput.files[0]) {
          alert('請先上傳 PDF');
          return;
        }

        const existingPdfBytes = await fileInput.files[0].arrayBuffer();
        const srcDoc = await PDFLib.PDFDocument.load(existingPdfBytes);
        const newDoc = await PDFLib.PDFDocument.create();

        const [copiedPage] = await newDoc.copyPages(srcDoc, [currentPage - 1]);
        const page = newDoc.addPage(copiedPage);

        const pngImage = await newDoc.embedPng(signatureImage);

        const scaleX = page.getWidth() / pdfCanvas.width;
        const scaleY = page.getHeight() / pdfCanvas.height;

        const pdfX = sigX * scaleX;
        const pdfY = page.getHeight() - (sigY * scaleY) - (sigDisplayHeight * scaleY);

        page.drawImage(pngImage, {
          x: pdfX,
          y: pdfY,
          width: sigDisplayWidth * scaleX,
          height: sigDisplayHeight * scaleY
        });

        const pdfBytes = await newDoc.save();

        const blob = new Blob([pdfBytes], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);

        const link = document.createElement('a');
        link.href = url;
        link.download = 'signed_single_page.pdf';

        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        setTimeout(() => URL.revokeObjectURL(url), 1000);
      } catch (err) {
        console.error(err);
        alert('下載失敗，請打開 console 查看錯誤');
      }
    }
  </script>
</body>
</html>
