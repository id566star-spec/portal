<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF 頁面預覽與合併工具</title>

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <!-- PDF-lib -->
  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

  <style>
    body {
      font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
      padding: 20px;
      background: #f5f7fb;
      color: #1f2937;
      margin: 0;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .sub-text {
      color: #4b5563;
      margin-bottom: 20px;
      line-height: 1.7;
    }

    .panel {
      background: #ffffff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
      margin-bottom: 20px;
    }

    .file-row, .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
    }

    input[type="file"] {
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
    }

    .mode-group {
      display: flex;
      gap: 16px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px 16px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 15px;
      cursor: pointer;
    }

    .primary-btn {
      background: #2563eb;
      color: #fff;
    }

    .secondary-btn {
      background: #e5e7eb;
    }

    .info-box {
      background: #eff6ff;
      padding: 14px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }

    .page-box {
      width: 150px;
      background: #111827;
      color: white;
      border-radius: 12px;
      padding: 10px;
      position: relative;
    }

    canvas {
      width: 100%;
      border-radius: 8px;
      background: white;
    }

    .checkbox {
      position: absolute;
      top: 8px;
      left: 8px;
      transform: scale(1.3);
    }

    .page-label {
      font-size: 12px;
      margin-top: 8px;
    }

    .empty-text {
      color: #6b7280;
      padding: 20px 0;
    }
  </style>
</head>

<body>
<div class="container">

<h1>PDF 頁面預覽與合併工具</h1>
<div class="sub-text">
  可上傳一個或多個 PDF 檔案，自由選擇頁面後輸出新 PDF。
</div>

<div class="panel">

  <div class="file-row">
    <input type="file" id="pdfFiles" accept="application/pdf" multiple>
    <button class="secondary-btn" onclick="clearAllFiles()">清除檔案</button>
  </div>

  <div class="toolbar">
    <div class="mode-group">
      <label>
        <input type="radio" name="mergeMode" value="delete" checked>
        勾選刪除
      </label>
      <label>
        <input type="radio" name="mergeMode" value="keep">
        勾選保留
      </label>
    </div>

    <button class="secondary-btn" onclick="selectAll()">全部勾選</button>
    <button class="secondary-btn" onclick="unselectAll()">全部取消</button>
    <button class="primary-btn" onclick="mergePDF()">輸出 PDF</button>
  </div>

  <div class="info-box">
    ✔ 勾選刪除：勾選的頁面會被移除<br>
    ✔ 勾選保留：只保留勾選的頁面
  </div>

</div>

<div class="panel">
  <h2>頁面預覽</h2>
  <div id="preview" class="grid">
    <div class="empty-text">請上傳 PDF 檔案</div>
  </div>
</div>

</div>

<script>
const fileInput = document.getElementById('pdfFiles');
const preview = document.getElementById('preview');

let pagesData = [];

fileInput.addEventListener('change', loadPDF);

async function loadPDF() {
  preview.innerHTML = '';
  pagesData = [];

  const files = [...fileInput.files];

  if (files.length === 0) {
    preview.innerHTML = '<div class="empty-text">請上傳 PDF 檔案</div>';
    return;
  }

  for (let fIndex = 0; fIndex < files.length; fIndex++) {
    const file = files[fIndex];
    const buffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;

    for (let p = 1; p <= pdf.numPages; p++) {
      const page = await pdf.getPage(p);
      const viewport = page.getViewport({ scale: 0.4 });

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = viewport.width;
      canvas.height = viewport.height;

      await page.render({ canvasContext: ctx, viewport }).promise;

      const box = document.createElement('div');
      box.className = 'page-box';

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.className = 'checkbox';

      const label = document.createElement('div');
      label.className = 'page-label';
      label.innerText = `${file.name} - 第${p}頁`;

      box.appendChild(checkbox);
      box.appendChild(canvas);
      box.appendChild(label);
      preview.appendChild(box);

      pagesData.push({
        fileIndex: fIndex,
        pageIndex: p - 1,
        checkbox
      });
    }
  }
}

function selectAll() {
  pagesData.forEach(p => p.checkbox.checked = true);
}

function unselectAll() {
  pagesData.forEach(p => p.checkbox.checked = false);
}

function clearAllFiles() {
  fileInput.value = '';
  pagesData = [];
  preview.innerHTML = '<div class="empty-text">請上傳 PDF 檔案</div>';
}

async function mergePDF() {
  const { PDFDocument } = PDFLib;
  const files = [...fileInput.files];

  if (files.length === 0) {
    alert('請先上傳 PDF 檔案');
    return;
  }

  const mode = document.querySelector('input[name="mergeMode"]:checked').value;
  const merged = await PDFDocument.create();

  for (let i = 0; i < files.length; i++) {
    const bytes = await files[i].arrayBuffer();
    const pdf = await PDFDocument.load(bytes);

    const pages = pagesData.filter(p => p.fileIndex === i);

    let keep = [];

    if (mode === 'delete') {
      keep = pages.filter(p => !p.checkbox.checked).map(p => p.pageIndex);
    } else {
      keep = pages.filter(p => p.checkbox.checked).map(p => p.pageIndex);
    }

    if (keep.length > 0) {
      const copied = await merged.copyPages(pdf, keep);
      copied.forEach(p => merged.addPage(p));
    }
  }

  if (merged.getPageCount() === 0) {
    alert('沒有可輸出的頁面');
    return;
  }

  const bytes = await merged.save();
  const blob = new Blob([bytes], { type: 'application/pdf' });

  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = '處理完成.pdf';
  link.click();
}
</script>

</body>
</html>
