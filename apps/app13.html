<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Reader SVG 向量版</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Microsoft JhengHei", Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      padding: 12px;
      background: #ffffff;
      border-bottom: 1px solid #d1d5db;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .group {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    button, input[type="file"] {
      height: 40px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 0 14px;
      background: white;
      font-size: 14px;
      font-weight: 600;
    }

    button {
      cursor: pointer;
    }

    button:hover {
      background: #f8fafc;
    }

    button.active {
      background: #2563eb;
      border-color: #2563eb;
      color: white;
    }

    .status {
      font-size: 14px;
      color: #374151;
      font-weight: 600;
    }

    .hint {
      font-size: 13px;
      color: #6b7280;
      padding: 8px 12px 12px;
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
      line-height: 1.6;
    }

    #viewerWrap {
      flex: 1;
      overflow-y: auto;
      padding: 24px 12px 40px;
      transition: background 0.2s ease;
      background: #e5e7eb;
    }

    #pdfPages {
      max-width: 1100px;
      margin: 0 auto;
    }

    .page-box {
      position: relative;
      margin: 0 auto 18px;
      width: fit-content;
      line-height: 0;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.14);
      background: white;
    }

    .page-inner {
      position: relative;
      display: block;
      transform-origin: top left;
    }

    .page-inner svg {
      display: block;
      width: auto;
      height: auto;
      max-width: none;
      background: white;
    }

    .page-label {
      position: absolute;
      right: 10px;
      bottom: 10px;
      background: rgba(0,0,0,0.65);
      color: white;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 999px;
      line-height: 1.2;
      z-index: 5;
    }

    .loading {
      text-align: center;
      color: #374151;
      font-size: 16px;
      padding: 30px 10px;
      font-weight: 700;
    }

    /* 模式：一般 */
    .mode-normal .page-inner {
      filter: none;
    }

    /* 模式：深色反轉 */
    .mode-dark .page-inner {
      filter: invert(1) hue-rotate(180deg) contrast(0.95) brightness(0.92);
    }

    /* 模式：暖色護眼 */
    .mode-warm .page-inner {
      filter: sepia(0.28) saturate(0.92) brightness(1.02) contrast(0.96);
    }

    .mode-warm .page-box::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(255, 235, 190, 0.18);
      mix-blend-mode: multiply;
      pointer-events: none;
      z-index: 2;
    }

    .mode-dark .page-box::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.06);
      mix-blend-mode: multiply;
      pointer-events: none;
      z-index: 2;
    }

    @media (max-width: 768px) {
      .topbar {
        padding: 10px;
      }

      button, input[type="file"] {
        height: 36px;
        font-size: 13px;
      }

      #viewerWrap {
        padding: 14px 8px 30px;
      }

      .page-label {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="group">
      <input type="file" id="fileInput" accept="application/pdf" />
    </div>

    <div class="group">
      <button id="zoomOutBtn">縮小</button>
      <button id="zoomInBtn">放大</button>
      <button id="fitWidthBtn">適合寬度</button>
    </div>

    <div class="group">
      <button id="modeNormalBtn" class="active">一般</button>
      <button id="modeDarkBtn">深色反轉</button>
      <button id="modeWarmBtn">暖色護眼</button>
    </div>

    <div class="group">
      <span class="status">總頁數：<span id="pageCount">0</span></span>
      <span class="status">縮放：<span id="zoomText">100%</span></span>
    </div>
  </div>

  <div class="hint">
    這版改成 SVG 向量顯示，放大縮小會比 canvas 更清楚。<br>
    直接往下捲動即可閱讀整份 PDF。
  </div>

  <div id="viewerWrap">
    <div id="pdfPages" class="mode-normal">
      <div class="loading">請先選擇 PDF 檔案</div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    const fileInput = document.getElementById("fileInput");
    const pdfPages = document.getElementById("pdfPages");
    const pageCountEl = document.getElementById("pageCount");
    const zoomText = document.getElementById("zoomText");

    const zoomInBtn = document.getElementById("zoomInBtn");
    const zoomOutBtn = document.getElementById("zoomOutBtn");
    const fitWidthBtn = document.getElementById("fitWidthBtn");

    const modeNormalBtn = document.getElementById("modeNormalBtn");
    const modeDarkBtn = document.getElementById("modeDarkBtn");
    const modeWarmBtn = document.getElementById("modeWarmBtn");
    const viewerWrap = document.getElementById("viewerWrap");

    let pdfDoc = null;
    let zoom = 1.0;
    let currentMode = "normal";
    let rendering = false;
    let basePageWidth = 0;

    function updateZoomText() {
      zoomText.textContent = Math.round(zoom * 100) + "%";
    }

    function setMode(mode) {
      currentMode = mode;

      pdfPages.classList.remove("mode-normal", "mode-dark", "mode-warm");
      pdfPages.classList.add("mode-" + mode);

      modeNormalBtn.classList.remove("active");
      modeDarkBtn.classList.remove("active");
      modeWarmBtn.classList.remove("active");

      if (mode === "normal") {
        modeNormalBtn.classList.add("active");
        viewerWrap.style.background = "#e5e7eb";
      } else if (mode === "dark") {
        modeDarkBtn.classList.add("active");
        viewerWrap.style.background = "#111827";
      } else if (mode === "warm") {
        modeWarmBtn.classList.add("active");
        viewerWrap.style.background = "#d6c8aa";
      }
    }

    async function pageToSVG(page) {
      const viewport = page.getViewport({ scale: 1.0 });
      const opList = await page.getOperatorList();

      const svgGfx = new pdfjsLib.SVGGraphics(page.commonObjs, page.objs);
      const svg = await svgGfx.getSVG(opList, viewport);

      svg.style.display = "block";
      svg.setAttribute("width", viewport.width);
      svg.setAttribute("height", viewport.height);

      return { svg, width: viewport.width, height: viewport.height };
    }

    function applyZoomToAllPages() {
      const inners = document.querySelectorAll(".page-inner");
      inners.forEach(inner => {
        inner.style.transform = `scale(${zoom})`;
      });

      const boxes = document.querySelectorAll(".page-box");
      boxes.forEach(box => {
        const baseW = parseFloat(box.dataset.baseWidth || "0");
        const baseH = parseFloat(box.dataset.baseHeight || "0");
        box.style.width = (baseW * zoom) + "px";
        box.style.height = (baseH * zoom) + "px";
      });

      updateZoomText();
    }

    async function renderAllPages() {
      if (!pdfDoc || rendering) return;
      rendering = true;

      pdfPages.innerHTML = `<div class="loading">PDF 載入中，請稍候...</div>`;

      try {
        const fragment = document.createDocumentFragment();

        for (let pageNum = 1; pageNum <= pdfDoc.numPages; pageNum++) {
          const page = await pdfDoc.getPage(pageNum);
          const { svg, width, height } = await pageToSVG(page);

          if (pageNum === 1) {
            basePageWidth = width;
          }

          const pageBox = document.createElement("div");
          pageBox.className = "page-box";
          pageBox.dataset.baseWidth = width;
          pageBox.dataset.baseHeight = height;
          pageBox.style.width = (width * zoom) + "px";
          pageBox.style.height = (height * zoom) + "px";

          const pageInner = document.createElement("div");
          pageInner.className = "page-inner";
          pageInner.style.width = width + "px";
          pageInner.style.height = height + "px";
          pageInner.style.transform = `scale(${zoom})`;

          const pageLabel = document.createElement("div");
          pageLabel.className = "page-label";
          pageLabel.textContent = `${pageNum} / ${pdfDoc.numPages}`;

          pageInner.appendChild(svg);
          pageBox.appendChild(pageInner);
          pageBox.appendChild(pageLabel);
          fragment.appendChild(pageBox);
        }

        pdfPages.innerHTML = "";
        pdfPages.appendChild(fragment);
        setMode(currentMode);
        updateZoomText();
      } catch (err) {
        pdfPages.innerHTML = `<div class="loading">PDF 載入失敗：${err.message}</div>`;
      } finally {
        rendering = false;
      }
    }

    function fitToWidth() {
      if (!basePageWidth) return;
      const availableWidth = Math.max(pdfPages.clientWidth - 20, 300);
      zoom = availableWidth / basePageWidth;
      if (zoom < 0.35) zoom = 0.35;
      applyZoomToAllPages();
    }

    fileInput.addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();

      reader.onload = async function() {
        try {
          pdfPages.innerHTML = `<div class="loading">正在讀取 PDF...</div>`;
          const typedArray = new Uint8Array(this.result);
          pdfDoc = await pdfjsLib.getDocument({ data: typedArray }).promise;
          pageCountEl.textContent = pdfDoc.numPages;
          zoom = 1.0;
          basePageWidth = 0;
          updateZoomText();
          await renderAllPages();
        } catch (err) {
          pdfPages.innerHTML = `<div class="loading">PDF 開啟失敗：${err.message}</div>`;
          pageCountEl.textContent = "0";
        }
      };

      reader.readAsArrayBuffer(file);
    });

    zoomInBtn.addEventListener("click", () => {
      if (!pdfDoc) return;
      zoom = Math.min(zoom + 0.1, 4);
      applyZoomToAllPages();
    });

    zoomOutBtn.addEventListener("click", () => {
      if (!pdfDoc) return;
      zoom = Math.max(zoom - 0.1, 0.35);
      applyZoomToAllPages();
    });

    fitWidthBtn.addEventListener("click", fitToWidth);

    modeNormalBtn.addEventListener("click", () => setMode("normal"));
    modeDarkBtn.addEventListener("click", () => setMode("dark"));
    modeWarmBtn.addEventListener("click", () => setMode("warm"));

    setMode("normal");
    updateZoomText();
  </script>
</body>
</html>
