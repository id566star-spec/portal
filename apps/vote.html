<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公司旅遊投票系統</title>
    <style>
        :root { --primary: #3498db; --bg: #f5f7fa; --gray: #95a5a6; }
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 700px; width: 100%; }
        
        #login-screen { text-align: center; padding: 40px 0; }
        input[type="text"] { padding: 12px; width: 60%; border: 2px solid #ddd; border-radius: 6px; font-size: 16px; margin-bottom: 20px; outline: none; }
        
        #vote-screen { display: none; }
        .user-header { display: flex; justify-content: space-between; align-items: center; background: #e8f4fd; padding: 10px 15px; border-radius: 8px; margin-bottom: 20px; }
        
        .option-item { display: flex; align-items: center; background: #fff; border: 1px solid #eee; padding: 15px; margin-bottom: 10px; border-radius: 10px; }
        .option-info { flex: 1; }
        .option-info a { color: var(--primary); text-decoration: none; font-size: 0.9em; }
        
        .btn { padding: 10px 20px; border-radius: 6px; cursor: pointer; border: none; font-weight: bold; transition: 0.3s; }
        .btn-vote { background: var(--primary); color: white; }
        .btn-vote:hover { background: #2980b9; }
        .btn-voted { background: #ecf0f1; color: var(--gray); cursor: not-allowed; }

        .stats-area { background: #f9fafb; padding: 20px; border-radius: 10px; margin-top: 40px; border: 1px solid #eee; }
        .bar-container { height: 10px; background: #e0e0e0; border-radius: 5px; margin: 8px 0 20px 0; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.6s ease; }
        
        .log-area { margin-top: 20px; font-size: 0.85em; max-height: 200px; overflow-y: auto; }
        .log-item { padding: 5px 0; border-bottom: 1px solid #eee; color: #666; }
        .btn-reset { margin-top: 40px; background: none; border: 1px solid #ddd; color: #ccc; cursor: pointer; width: 100%; padding: 5px; }
    </style>
</head>
<body>

<div class="container">
    <!-- 登錄界面 -->
    <div id="login-screen">
        <h2>👋 公司旅遊住宿包棟投票</h2>
        <p>請輸入您的暱稱（系統將記住您的投票狀態）</p>
        <input type="text" id="username-input" placeholder="請輸入姓名" maxlength="10">
        <br>
        <button class="btn btn-vote" style="padding: 12px 40px;" onclick="enterVote()">開始投票</button>
    </div>

    <!-- 投票主界面 -->
    <div id="vote-screen">
        <div class="user-header">
            <span>你好，<strong id="display-name" style="color:var(--primary)"></strong></span>
            <button class="btn" style="background:#ddd; font-size:0.8em;" onclick="location.reload()">切換使用者</button>
        </div>

        <h3>🏠 候選民宿（可多選）</h3>
        <div id="options-container"></div>

        <div class="stats-area">
            <h3>📊 目前統計 (最高票前 2 名為準)</h3>
            <div id="stats-display"></div>
            
            <div class="log-area">
                <h4>📜 投票動態</h4>
                <div id="vote-logs"></div>
            </div>
        </div>

        <button class="btn-reset" onclick="clearAll()">重置所有數據 (慎用)</button>
    </div>
</div>

<script>
    const villas = [
        { id: "v1", name: "小琉球地中海 M-Villa", url: "https://www.mvilla.com.tw/" },
        { id: "v2", name: "尊順祿藝術 WVILLA", url: "https://www.wvilla.com.tw/" },
        { id: "v3", name: "逗琉 DORY", url: "https://www.dory.com.tw/" },
        { id: "v4", name: "拉美 LAMEI", url: "https://www.lamei.com.tw/" },
        { id: "v5", name: "極宿 EXBNB", url: "https://www.exbnb.club.tw/" }
    ];

    let currentUser = "";
    // 結構：{ "姓名": ["民宿ID1", "民宿ID2"] }
    let userRecords = JSON.parse(localStorage.getItem('voteRecords')) || {};
    // 結構：{ "民宿ID": 票數 }
    let voteCounts = JSON.parse(localStorage.getItem('voteCounts')) || { v1:0, v2:0, v3:0, v4:0, v5:0 };
    // 結構：[{text: 'xxx'}]
    let logs = JSON.parse(localStorage.getItem('voteLogs')) || [];

    function enterVote() {
        const name = document.getElementById('username-input').value.trim();
        if (!name) return alert("請輸入暱稱！");
        currentUser = name;
        if (!userRecords[currentUser]) userRecords[currentUser] = [];
        
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('vote-screen').style.display = 'block';
        document.getElementById('display-name').innerText = currentUser;
        render();
    }

    function castVote(vId, vName) {
        // 防重複邏輯
        if (userRecords[currentUser].includes(vId)) {
            alert("您已經投過這間民宿囉！");
            return;
        }

        // 紀錄投票
        userRecords[currentUser].push(vId);
        voteCounts[vId]++;
        logs.unshift(`${currentUser} 投給了 ${vName}`);
        
        save();
        render();
    }

    function save() {
        localStorage.setItem('voteRecords', JSON.stringify(userRecords));
        localStorage.setItem('voteCounts', JSON.stringify(voteCounts));
        localStorage.setItem('voteLogs', JSON.stringify(logs));
    }

    function render() {
        // 選項區
        const container = document.getElementById('options-container');
        container.innerHTML = villas.map(v => {
            const hasVoted = userRecords[currentUser].includes(v.id);
            return `
                <div class="option-item">
                    <div class="option-info">
                        <strong>${v.name}</strong><br>
                        <a href="${v.url}" target="_blank">🔗 官網連結</a>
                    </div>
                    <button class="btn ${hasVoted ? 'btn-voted' : 'btn-vote'}" 
                            onclick="castVote('${v.id}', '${v.name}')">
                        ${hasVoted ? '已投票' : '投一票'}
                    </button>
                </div>
            `;
        }).join('');

        // 統計區
        const statsDisplay = document.getElementById('stats-display');
        const total = Object.values(voteCounts).reduce((a, b) => a + b, 0);
        
        statsDisplay.innerHTML = villas.map(v => {
            const count = voteCounts[v.id];
            const pct = total === 0 ? 0 : Math.round((count / total) * 100);
            return `
                <div style="display:flex; justify-content:space-between; font-size:0.9em;">
                    <span>${v.name}</span>
                    <span>${count} 票</span>
                </div>
                <div class="bar-container"><div class="bar-fill" style="width:${pct}%"></div></div>
            `;
        }).join('');

        // 日誌區
        document.getElementById('vote-logs').innerHTML = logs.map(l => `<div class="log-item">${l}</div>`).join('');
    }

    function clearAll() {
        if(confirm("這將刪除所有人、所有票數與紀錄，確定嗎？")) {
            localStorage.clear();
            location.reload();
        }
    }
</script>

</body>
</html>
