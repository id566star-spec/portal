<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><title>客戶生日管理系統</title><style>body{font-family:"Microsoft JhengHei",Arial;background:#f2f2f2;padding:30px;}.container{background:white;padding:25px;border-radius:10px;max-width:900px;margin:auto;box-shadow:0 0 10px rgba(0,0,0,0.1);}h2{text-align:center;}input,button,textarea{width:100%;padding:10px;margin-top:8px;margin-bottom:10px;font-size:16px;}button{background:#4CAF50;color:white;border:none;border-radius:5px;cursor:pointer;}button:hover{background:#45a049;}.copybtn{background:#2196F3;}.calendarbtn{background:#FF9800;}.deletebtn{background:#f44336;}table{width:100%;border-collapse:collapse;margin-top:20px;}th,td{border:1px solid #ddd;padding:8px;text-align:center;}#todayList{background:#fff3cd;padding:10px;border-radius:5px;}</style></head><body><div class="container"><h2>客戶生日管理系統</h2><label>客戶姓名</label><input type="text" id="name"><label>生日</label><input type="date" id="birthday"><button onclick="addClient()">新增客戶</button><h3>今天生日</h3><div id="todayList"></div><h3>客戶列表</h3><table><thead><tr><th>姓名</th><th>生日</th><th>祝福</th><th>Google日曆</th><th>刪除</th></tr></thead><tbody id="clientTable"></tbody></table><label>祝福訊息</label><textarea id="message" rows="6"></textarea><button class="copybtn" onclick="copyMessage()">複製祝福</button></div><script>let clients=JSON.parse(localStorage.getItem("clients")) || [];function save(){localStorage.setItem("clients",JSON.stringify(clients));}function addClient(){let name=document.getElementById("name").value;let birthday=document.getElementById("birthday").value;if(name==""||birthday==""){alert("請填寫完整資料");return;}clients.push({name:name,birthday:birthday});save();render();document.getElementById("name").value="";document.getElementById("birthday").value="";}function render(){let table=document.getElementById("clientTable");table.innerHTML="";let today=new Date();let month=today.getMonth()+1;let day=today.getDate();let todayList="";clients.forEach((c,i)=>{let b=new Date(c.birthday);let m=b.getMonth()+1;let d=b.getDate();let row=`<tr><td>${c.name}</td><td>${c.birthday}</td><td><button onclick="generate('${c.name}')">祝福</button></td><td><button class="calendarbtn" onclick="addToCalendar('${c.name}','${c.birthday}')">加入</button></td><td><button class="deletebtn" onclick="deleteClient(${i})">刪除</button></td></tr>`;table.innerHTML+=row;if(m==month && d==day){todayList+=c.name+" 今天生日 🎂<br>";}});document.getElementById("todayList").innerHTML=todayList || "今天沒有客戶生日";}function generate(name){let msg=`${name} 您好：今天是您的生日 🎂祝您生日快樂！願新的一歲平安健康、萬事順心，每天都充滿喜悅與好運。誠摯祝福`;document.getElementById("message").value=msg;}function copyMessage(){let copyText=document.getElementById("message");copyText.select();navigator.clipboard.writeText(copyText.value);alert("祝福已複製，可以貼到LINE或簡訊");}function deleteClient(index){if(confirm("確定要刪除這位客戶嗎？")){clients.splice(index,1);save();render();}}function addToCalendar(name,birthday){let date=new Date(birthday);let year=date.getFullYear();let month=(date.getMonth()+1).toString().padStart(2,'0');let day=date.getDate().toString().padStart(2,'0');let start=year+month+day;let text=encodeURIComponent(name+" 生日");let details=encodeURIComponent("記得傳生日祝福");let url=`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${text}&dates=${start}/${start}&details=${details}&recur=RRULE:FREQ=YEARLY`;window.open(url,"_blank");}render();</script></body></html>
