<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MP4 轉 MP3</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
      padding: 28px;
    }

    h1 {
      margin: 0 0 10px;
      text-align: center;
      font-size: 28px;
      color: #111827;
    }

    .sub {
      text-align: center;
      color: #6b7280;
      margin-bottom: 24px;
      line-height: 1.7;
      font-size: 14px;
    }

    .upload-box {
      border: 2px dashed #cbd5e1;
      border-radius: 18px;
      padding: 20px;
      text-align: center;
      background: #f8fafc;
      margin-bottom: 16px;
    }

    input[type="file"] {
      display: block;
      width: 100%;
      margin-bottom: 12px;
      font-size: 15px;
    }

    .filename {
      color: #334155;
      font-size: 14px;
      word-break: break-all;
      min-height: 24px;
    }

    button {
      width: 100%;
      border: none;
      background: #2563eb;
      color: white;
      font-size: 16px;
      font-weight: 700;
      border-radius: 14px;
      padding: 14px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #1d4ed8;
    }

    button:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }

    .status {
      margin-top: 16px;
      background: #f1f5f9;
      border-radius: 14px;
      padding: 14px;
      color: #0f172a;
      font-size: 14px;
      line-height: 1.7;
      min-height: 52px;
      white-space: pre-wrap;
    }

    .note {
      margin-top: 14px;
      font-size: 12px;
      color: #64748b;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>MP4 轉 MP3</h1>
    <div class="sub">上傳 MP4 影片，伺服器會幫你轉成 MP3 後自動下載</div>

    <div class="upload-box">
      <input type="file" id="fileInput" accept=".mp4,video/mp4" />
      <div class="filename" id="fileName">尚未選擇檔案</div>
    </div>

    <button id="convertBtn">開始轉換</button>

    <div class="status" id="status">請先選擇 MP4 檔案。</div>

    <div class="note">
      支援 MP4 檔案。<br />
      轉換中請不要關閉頁面。
    </div>
  </div>

  <script>
    const fileInput = document.getElementById("fileInput");
    const fileName = document.getElementById("fileName");
    const convertBtn = document.getElementById("convertBtn");
    const statusBox = document.getElementById("status");

    let selectedFile = null;

    fileInput.addEventListener("change", function () {
      selectedFile = this.files[0] || null;
      fileName.textContent = selectedFile ? selectedFile.name : "尚未選擇檔案";
      statusBox.textContent = selectedFile
        ? "已選擇檔案，請按「開始轉換」。"
        : "請先選擇 MP4 檔案。";
    });

    convertBtn.addEventListener("click", async function () {
      if (!selectedFile) {
        alert("請先選擇 MP4 檔案");
        return;
      }

      const formData = new FormData();
      formData.append("video", selectedFile);

      convertBtn.disabled = true;
      statusBox.textContent = "正在上傳並轉換，請稍候...";

      try {
        const response = await fetch("/convert", {
          method: "POST",
          body: formData
        });

        if (!response.ok) {
          let errorMessage = "轉換失敗";
          try {
            const errorData = await response.json();
            errorMessage = errorData.error || errorMessage;
            if (errorData.detail) {
              errorMessage += "\n" + errorData.detail;
            }
          } catch {}
          throw new Error(errorMessage);
        }

        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = selectedFile.name.replace(/\.mp4$/i, "") + ".mp3";
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.URL.revokeObjectURL(url);

        statusBox.textContent = "轉換完成，MP3 已開始下載。";
      } catch (error) {
        statusBox.textContent = "發生錯誤：\n" + error.message;
      } finally {
        convertBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
